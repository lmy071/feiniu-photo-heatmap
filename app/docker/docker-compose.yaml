version: "3.8"

services:
  webapp:
    image: node:18-alpine
    container_name: feiniu-photo-heatmap
    restart: unless-stopped
    ports:
      - "8088:3000"
    volumes:
      - ./app:/app
    working_dir: /app
    command: sh -c "npm install && node server.js"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
