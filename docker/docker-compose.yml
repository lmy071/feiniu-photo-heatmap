version: '3.8'

services:
  feiniu-photo-heatmap:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: feiniu-photo-heatmap
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - SCAN_PATHS=${SCAN_PATHS:-/photos}
      - PORT=3000
    volumes:
      # 挂载飞牛 NAS 照片目录（部署时按实际情况修改）
      - /vol1/1000/Photo:/photos:ro
    networks:
      - default

networks:
  default:
    name: feiniu-network
